<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Watermark Test</title>
    <style>
        :root { --bg: #ffffff; --ink: #000000; }
        [data-theme="dark"] { --bg: #000000; --ink: #ffffff; }
        body { background: var(--bg); color: var(--ink); font-family: sans-serif; height: 200vh; }
        
        /* --- WATERMARK OVERLAY --- */
        .watermark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .watermark-image {
            opacity: 0.1;
            max-width: 30%;
            height: auto;
            mix-blend-mode: multiply;
            transition: all 0.3s ease;
        }

        /* Dark Mode Watermark Logic */
        [data-theme="dark"] .watermark-overlay {
            mix-blend-mode: screen;
        }

        [data-theme="dark"] .watermark-image {
            filter: invert(1);
            opacity: 0.25;
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <div class="watermark-overlay">
        <img src="https://res.cloudinary.com/dxwszplz7/image/upload/v1774344007/VARDAAN_watermark_jxdqqb_yescam.png"
            alt="Vardaan Watermark" class="watermark-image">
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
    
    <div style="padding: 50px;">
        <h1>Watermark Test Page</h1>
        <p>Scroll down to see if watermark is fixed.</p>
        <div style="height: 1000px; border: 2px dashed #ccc; margin-top: 50px;">Content area</div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }
    </script>
</body>
</html>
