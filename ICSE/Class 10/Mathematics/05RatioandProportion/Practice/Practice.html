<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Arena - Ratioand Proportion</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .back-btn { align-self: flex-start; color: #ccc; text-decoration: none; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; font-weight: 500; transition: color 0.3s; }
        .back-btn:hover { color: #fff; }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(45deg, #00ffff, #9933ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .subtitle { color: #888; margin-top: 10px; text-align: center; font-size: 1.1rem; }
        .levels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .level-card { background: #2d2d2d; border: 1px solid #444; border-radius: 16px; padding: 25px; color: #fff; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        .level-card:hover { transform: translateY(-5px); border-color: #666; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4); }
        .card-header-content { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .level-icon { width: 40px; height: 40px; }
        .text-group { display: flex; flex-direction: column; gap: 4px; }
        .level-title { font-size: 1.4rem; font-weight: 600; margin: 0; letter-spacing: 0.5px; }
        .level-desc { font-size: 0.85rem; color: #aaa; margin: 0; }
        .card-actions { display: flex; gap: 10px; margin-top: auto; }
        .action-btn { flex: 1; padding: 12px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 0.95rem; transition: all 0.3s ease; border: 1px solid transparent; }
        .btn-question { background-color: rgba(0, 255, 255, 0.1); color: #00ffff; border-color: rgba(0, 255, 255, 0.3); }
        .btn-question:hover { background-color: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        .btn-answer { background-color: rgba(153, 51, 255, 0.1); color: #d9b3ff; border-color: rgba(153, 51, 255, 0.3); }
        .btn-answer:hover { background-color: rgba(153, 51, 255, 0.2); border-color: #9933ff; }
        .level-card.mastersheet-card { background: linear-gradient(135deg, #112d1b 0%, #1c1c1c 100%) !important; border: 2px solid rgba(0, 255, 102, 0.4) !important; }
        .level-card.mastersheet-card:hover { border-color: #00ff66 !important; box-shadow: 0 10px 25px rgba(0, 255, 102, 0.3) !important; }
        .icon-mastersheet { color: #00ff66 !important; }
        .mastersheet-card .btn-answer { background-color: rgba(0, 255, 102, 0.1) !important; color: #00ff66 !important; border-color: rgba(0, 255, 102, 0.3) !important; }
        .mastersheet-card .btn-answer:hover { background-color: rgba(0, 255, 102, 0.2) !important; border-color: #00ff66 !important; }
    </style>
</head>
<body>
    <a href="../../Mathematics.html" class="back-btn"><i data-lucide="arrow-left"></i> Back to Chapters</a>
    <div class="header">
        <h1>Practice Arena</h1>
        <div class="subtitle">Ratioand Proportion</div>
    </div>
    <div class="levels-grid">
        <!-- Mastersheet -->
        <div class="level-card mastersheet-card">
            <div class="card-header-content">
                <i data-lucide="file-spreadsheet" class="level-icon icon-mastersheet"></i>
                <div class="text-group">
                    <span class="level-title">Mastersheet</span>
                    <span class="level-desc">Comprehensive Question Bank</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="Mastersheet_Questions.html" class="action-btn btn-question"><i data-lucide="file-question" style="width:16px;"></i> Question</a>
                <a href="Mastersheet_Solution.html" class="action-btn btn-answer"><i data-lucide="file-check" style="width:16px;"></i> Answer</a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
