<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 11 Chemistry - NCERT PDF Chapter 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .nav-bar {
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 5, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(170, 51, 255, 0.3);
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: #00ffff;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 15px rgba(170, 51, 255, 0.8);
            text-align: center;
            flex-grow: 1;
        }

        .external-link {
            text-decoration: none;
            color: #d9b3ff;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(153, 51, 255, 0.3);
            border-radius: 20px;
            background: rgba(153, 51, 255, 0.1);
            transition: all 0.3s ease;
        }

        .external-link:hover {
            background: rgba(153, 51, 255, 0.2);
            color: #fff;
            border-color: #9933ff;
            box-shadow: 0 0 15px rgba(153, 51, 255, 0.3);
        }

        .pdf-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 80px); /* Account for navbar */
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .nav-bar {
                padding: 15px;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: space-between;
            }
            .title {
                font-size: 1.1rem;
                order: 3;
                width: 100%;
                margin-top: 5px;
            }
            .pdf-container {
                height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../../Chemistry.html" class="back-btn">
            <i data-lucide="arrow-left"></i> Chapter List
        </a>
        <h1 class="title">NCERT PDF: Some Basic Concepts of Chemistry</h1>
        <a href="https://ncert.nic.in/textbook/pdf/kech101.pdf" target="_blank" class="external-link">
            Open in New Tab <i data-lucide="external-link"></i>
        </a>
    </div>

    <div class="pdf-container">
        <!-- Direct embed often works better than Google Docs Viewer if the server is just slow -->
        <embed src="https://ncert.nic.in/ncerts/l/kech101.pdf" type="application/pdf" width="100%" height="100%" />
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
