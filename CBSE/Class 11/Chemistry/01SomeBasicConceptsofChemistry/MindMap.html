<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 11 Chemistry - Mind Map Chapter 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #9933ff;
            --secondary: #00ffff;
            --bg-dark: #0a0514;
            --card-bg: rgba(20, 10, 30, 0.6);
            --text-main: #ffffff;
            --text-muted: #d9b3ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', cursive;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .nav-bar {
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 5, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(170, 51, 255, 0.3);
            z-index: 10;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .title {
            font-family: 'Comic Neue', 'Comic Sans MS', 'Comic Sans', cursive;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(153, 51, 255, 0.5);
            text-align: center;
        }

        .download-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(153, 51, 255, 0.2);
            border: 1px solid var(--primary);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px rgba(153, 51, 255, 0.5);
        }

        .image-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: auto;
            /* Scrollbar for image container */
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg-dark);
        }

        .image-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .image-container::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 10px;
        }

        .mindmap-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(153, 51, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .mindmap-image:hover {
            transform: scale(1.02);
        }

        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .title {
                font-size: 1.2rem;
            }
            .mindmap-image {
                border-radius: 8px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-bar">
        <a href="../../Chemistry.html" class="back-btn"><i data-lucide="arrow-left"></i> Chapter List</a>
        <div class="title">MIND MAP: SOME BASIC CONCEPTS OF CHEMISTRY</div>
        <a href="Images/mindmap.png" download="MindMap_Ch1_Chemistry.png" class="download-btn"><i data-lucide="download"></i> Download</a>
    </div>

    <div class="image-container">
        <img src="Images/mindmap.png" alt="Chemistry Chapter 1 Mind Map" class="mindmap-image">
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
