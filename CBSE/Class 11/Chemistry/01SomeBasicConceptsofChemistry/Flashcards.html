<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1 Flashcards - Vardaan Learning Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #9933ff;
            --secondary: #00ffff;
            --bg-dark: #0a0514;
            --text-main: #ffffff;
            --text-muted: #d9b3ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(153, 51, 255, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 255, 255, 0.1), transparent 40%);
        }

        .nav-bar {
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 5, 20, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(170, 51, 255, 0.3);
            z-index: 10;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(153, 51, 255, 0.5);
            text-align: center;
        }

        .swipe-hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- CAROUSEL CONTAINER --- */
        .flashcard-carousel {
            flex-grow: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 0;
            align-items: center;
        }
        
        .flashcard-carousel::-webkit-scrollbar {
            display: none;
        }

        /* --- IMAGE FLASHCARD --- */
        .flashcard-wrapper {
            scroll-snap-align: center;
            flex: 0 0 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .flashcard-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(153, 51, 255, 0.3);
            border: 2px solid rgba(153, 51, 255, 0.4);
            transition: transform 0.3s ease;
        }

        .flashcard-image:hover {
            transform: scale(1.02);
        }

        /* Desktop arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(153, 51, 255, 0.3);
            border: 1px solid var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .nav-arrow:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .arrow-left { left: 30px; }
        .arrow-right { right: 30px; }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
            transform: scale(1.3);
        }

        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .title { font-size: 1.2rem; }
            .nav-arrow { display: none; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="../../Chemistry.html" class="back-btn"><i data-lucide="arrow-left"></i> Chapter List</a>
        <div class="title">FLASHCARDS: SOME BASIC CONCEPTS OF CHEMISTRY</div>
        <div class="swipe-hint"><i data-lucide="move-horizontal"></i> Swipe to view</div>
    </div>

    <button class="nav-arrow arrow-left" onclick="scrollCarousel(-1)"><i data-lucide="chevron-left"></i></button>
    <button class="nav-arrow arrow-right" onclick="scrollCarousel(1)"><i data-lucide="chevron-right"></i></button>

    <div class="flashcard-carousel" id="carousel">
        
        <!-- Script will populate these -->

    </div>
    
    <div class="progress-dots" id="dotsContainer"></div>

    <script>
        lucide.createIcons();

        const images = [
            "flashcard_1_matter_1780560292643.png",
            "flashcard_2_si_units_1780560306692.png",
            "flashcard_3_sig_figs_1780560319677.png",
            "flashcard_4_laws_1780560334631.png",
            "flashcard_5_dalton_1780560347179.png",
            "flashcard_6_masses_1780560372024.png",
            "flashcard_7_mole_1780560384673.png",
            "flashcard_8_composition_1780560397024.png",
            "flashcard_9_stoichiometry_1780560410280.png",
            "flashcard_10_solutions_1780560423669.png"
        ];

        const carousel = document.getElementById('carousel');
        const dotsContainer = document.getElementById('dotsContainer');

        // Populate cards
        images.forEach((img, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'flashcard-wrapper';
            wrapper.innerHTML = `<img src="Images/${img}" alt="Flashcard ${i+1}" class="flashcard-image">`;
            carousel.appendChild(wrapper);

            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');

        // Scroll listener for dots update
        carousel.addEventListener('scroll', () => {
            const index = Math.round(carousel.scrollLeft / window.innerWidth);
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        });

        // Desktop Arrow Navigation
        function scrollCarousel(direction) {
            const scrollAmount = window.innerWidth * direction;
            carousel.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        }
    </script>
</body>
</html>
