<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 11 Chemistry - NCERT Solutions Chapter 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #9933ff;
            --secondary: #00ffff;
            --bg-dark: #0a0514;
            --card-bg: rgba(20, 10, 30, 0.6);
            --text-main: #ffffff;
            --text-muted: #d9b3ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- SCROLLBAR --- */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-thumb { background-color: #aa33ff; border-radius: 10px; border: 2px solid var(--bg-dark); }
        body::-webkit-scrollbar-track { background-color: var(--bg-dark); }

        .nav-bar {
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 5, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(170, 51, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            text-decoration: none;
            color: var(--secondary);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        .header-title {
            text-align: center;
            margin: 40px 20px 20px;
        }

        .header-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 20px rgba(170, 51, 255, 0.8);
        }

        .header-title p {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 1rem;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .tab-btn {
            background: rgba(153, 51, 255, 0.1);
            border: 1px solid rgba(153, 51, 255, 0.3);
            color: var(--text-muted);
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(153, 51, 255, 0.4), rgba(139, 0, 255, 0.4));
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(153, 51, 255, 0.4);
        }

        /* --- CONTENT AREA --- */
        .content-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 50px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .content-section.active {
            display: block;
        }

        /* --- ACCORDION --- */
        .accordion-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 51, 255, 0.3);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .accordion-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.3s;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--secondary);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
            color: #fff;
            flex-grow: 1;
            padding-right: 20px;
        }

        .q-label {
            color: var(--secondary);
            margin-right: 8px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
        }

        .toggle-icon {
            color: var(--secondary);
            transition: transform 0.3s ease;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .accordion-item.active .toggle-icon {
            transform: rotate(180deg);
        }

        .accordion-item.active {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0, 0, 0, 0.3);
        }

        .answer-content {
            padding: 25px;
            color: #e0e0e0;
            line-height: 1.6;
            font-size: 0.95rem;
            border-top: 1px solid rgba(170, 51, 255, 0.2);
        }

        .answer-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        /* --- MATHJAX OVERRIDES --- */
        .MathJax {
            color: #dcbfff !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .header-title h1 { font-size: 1.6rem; }
            .accordion-header { padding: 15px 20px; }
            .question-text { font-size: 0.95rem; }
            .answer-content { padding: 20px; font-size: 0.9rem; }
            .tabs { flex-direction: column; gap: 10px; }
            .tab-btn { padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="../../Chemistry.html" class="back-btn">
            <i data-lucide="arrow-left"></i> Chapter List
        </a>
    </div>

    <div class="header-title">
        <h1>NCERT Solutions</h1>
        <p>Chapter 1: Some Basic Concepts of Chemistry</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('intext')">In-Text Questions</button>
        <button class="tab-btn" onclick="switchTab('exercise')">Back Exercise Questions</button>
    </div>

    <div id="intext" class="content-section active">
        <!-- In-text questions injected here -->
    </div>

    <div id="exercise" class="content-section">
        <!-- Exercise questions injected here -->
    </div>

    <!-- Data file containing all questions and solutions -->
    <script src="questions.js"></script>

    <script>
        lucide.createIcons();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function toggleAccordion(header) {
            const item = header.parentElement;
            const body = item.querySelector('.accordion-body');
            
            item.classList.toggle('active');
            
            if (item.classList.contains('active')) {
                body.style.maxHeight = body.scrollHeight + "px";
            } else {
                body.style.maxHeight = null;
            }
        }

        function renderQuestions(containerId, questionsData) {
            const container = document.getElementById(containerId);
            let html = '';
            
            questionsData.forEach((q) => {
                html += `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div class="question-text">
                            <span class="q-label">${q.id}.</span> ${q.question}
                        </div>
                        <i data-lucide="chevron-down" class="toggle-icon"></i>
                    </div>
                    <div class="accordion-body">
                        <div class="answer-content">
                            <span class="answer-label">Solution:</span>
                            ${q.answer}
                        </div>
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }

        window.onload = () => {
            renderQuestions('intext', inTextQuestions);
            renderQuestions('exercise', exerciseQuestions);
            lucide.createIcons();
            
            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        };
    </script>
</body>
</html>
