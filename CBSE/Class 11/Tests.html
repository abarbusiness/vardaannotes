<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vardaan Comet - Tests</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- SCROLLBAR --- */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-thumb { background-color: #aa33ff; border-radius: 10px; border: 2px solid #0a0514; }
        body::-webkit-scrollbar-track { background-color: #0a0514; }

        /* --- 3D BACKGROUND --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- CONTENT --- */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- NAV --- */
        .nav-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            color: #00ffff;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        /* --- LOGO CONTAINER --- */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            overflow: visible;
            cursor: pointer;
        }

        .logo-img {
            height: 100px;
            width: auto;
            object-fit: contain;
        }

        /* --- HEADER --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 20px rgba(170, 51, 255, 0.8);
        }

        .subtitle {
            color: #dcbfff;
            margin-top: 8px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* --- TESTS CONTAINER --- */
        .tests-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
            animation: slideUp 1s ease-out 0.5s forwards;
            opacity: 0;
        }

        .test-item {
            background: rgba(20, 10, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 51, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .test-item:hover {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(170, 51, 255, 0.2);
        }

        .test-header {
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.3s;
        }

        .test-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .test-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .test-icon {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: #9933ff;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(153, 51, 255, 0.4);
        }

        .test-name {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 600;
        }

        .toggle-icon {
            color: #00ffff;
            transition: transform 0.3s ease;
            width: 24px;
            height: 24px;
        }

        .test-item.active .toggle-icon {
            transform: rotate(180deg);
        }

        /* --- DROPDOWN & SETS --- */
        .test-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0, 0, 0, 0.2);
        }

        .sets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 25px;
        }

        .set-card {
            background: linear-gradient(135deg, rgba(153, 51, 255, 0.15), rgba(100, 20, 180, 0.1));
            border: 2px solid rgba(153, 51, 255, 0.4);
            border-radius: 16px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .set-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(153, 51, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .set-card:hover {
            background: linear-gradient(135deg, rgba(153, 51, 255, 0.25), rgba(100, 20, 180, 0.2));
            border-color: #00ffff;
            box-shadow: 0 8px 30px rgba(153, 51, 255, 0.4), inset 0 0 20px rgba(170, 51, 255, 0.1);
            transform: translateY(-8px) scale(1.05);
            z-index: 1;
        }

        .set-card:hover::before {
            opacity: 1;
        }

        .set-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #00ffff, #aa33ff);
            color: #000;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .set-title {
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            font-size: 1.15rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 1;
        }

        .set-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
            z-index: 1;
        }

        .capsule-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.12), rgba(170, 51, 255, 0.12));
            border: 1.5px solid rgba(153, 51, 255, 0.4);
            border-radius: 25px;
            padding: 12px 18px;
            text-align: center;
            color: #d9b3ff;
            text-decoration: none;
            transition: all 0.35s ease;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .capsule-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .capsule-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(170, 51, 255, 0.2));
            box-shadow: 0 6px 20px rgba(153, 51, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.1);
            color: #ffffff;
            border-color: #9933ff;
            transform: translateY(-3px);
        }

        .capsule-btn:hover::before {
            left: 100%;
        }

        .capsule-btn.question {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 200, 100, 0.1));
            border-color: rgba(0, 255, 136, 0.5);
            color: #7fffaa;
        }

        .capsule-btn.question:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.25), rgba(0, 200, 100, 0.2));
            border-color: #00ff88;
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4), inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .capsule-btn.solution {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.15), rgba(255, 140, 0, 0.1));
            border-color: rgba(255, 170, 0, 0.5);
            color: #ffbb66;
        }

        .capsule-btn.solution:hover {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.25), rgba(255, 140, 0, 0.2));
            border-color: #ffaa00;
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(255, 170, 0, 0.4), inset 0 0 10px rgba(255, 170, 0, 0.1);
        }

        /* Footer */
        footer { margin-top: auto; padding-top: 40px; text-align: center; color: #888; font-size: 0.8rem; width: 100%; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .test-header { padding: 15px 20px; }
            .test-icon { font-size: 1.5rem; }
            .test-name { font-size: 1rem; }
            .sets-grid { grid-template-columns: repeat(1, 1fr); gap: 10px; padding: 15px; }
            .capsule-btn { padding: 8px 12px; font-size: 0.85rem; }
            .logo-img { height: 60px; }
        }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="main-content">
        <div class="nav-bar">
            <a href="Class11.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Subjects
            </a>
            <!-- Brand Logo -->
            <a href="../../index.html" class="brand-container">
                <img src="../../Vardaan comet logo animation video loop.gif" alt="Vardaan Comet Logo" class="logo-img">
            </a>
        </div>

        <div class="header-section">
            <h1>MINOR TEST 1</h1>
            <div class="subtitle">Practice with Multiple Sets</div>
        </div>

        <div class="tests-container">
            <div class="test-item">
                <div class="test-header" onclick="toggleTest(this)">
                    <div class="test-title-group">
                        <span class="test-icon"><i class="fas fa-file-alt"></i></span>
                        <span class="test-name">Minor Test 1 - Full Course</span>
                    </div>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div class="test-content">
                    <div class="sets-grid">
                        <!-- Set A -->
                        <div class="set-card">
                            <div class="set-title">SET A</div>
                            <div class="set-buttons">
                                <a href="MinorTest1/SetA/QuestionPaper.html" class="capsule-btn question">
                                    <i class="fas fa-book"></i> Question Paper
                                </a>
                                <a href="MinorTest1/SetA/Solution.html" class="capsule-btn solution">
                                    <i class="fas fa-lightbulb"></i> Solution
                                </a>
                            </div>
                        </div>

                        <!-- Set B -->
                        <div class="set-card">
                            <div class="set-title">SET B</div>
                            <div class="set-buttons">
                                <a href="MinorTest1/SetB/QuestionPaper.html" class="capsule-btn question">
                                    <i class="fas fa-book"></i> Question Paper
                                </a>
                                <a href="MinorTest1/SetB/Solution.html" class="capsule-btn solution">
                                    <i class="fas fa-lightbulb"></i> Solution
                                </a>
                            </div>
                        </div>

                        <!-- Set C -->
                        <div class="set-card">
                            <div class="set-title">SET C</div>
                            <div class="set-buttons">
                                <a href="MinorTest1/SetC/QuestionPaper.html" class="capsule-btn question">
                                    <i class="fas fa-book"></i> Question Paper
                                </a>
                                <a href="MinorTest1/SetC/Solution.html" class="capsule-btn solution">
                                    <i class="fas fa-lightbulb"></i> Solution
                                </a>
                            </div>
                        </div>

                        <!-- Set D -->
                        <div class="set-card">
                            <div class="set-title">SET D</div>
                            <div class="set-buttons">
                                <a href="MinorTest1/SetD/QuestionPaper.html" class="capsule-btn question">
                                    <i class="fas fa-book"></i> Question Paper
                                </a>
                                <a href="MinorTest1/SetD/Solution.html" class="capsule-btn solution">
                                    <i class="fas fa-lightbulb"></i> Solution
                                </a>
                            </div>
                        </div>

                        <!-- Set E -->
                        <div class="set-card">
                            <div class="set-title">SET E</div>
                            <div class="set-buttons">
                                <a href="MinorTest1/SetE/QuestionPaper.html" class="capsule-btn question">
                                    <i class="fas fa-book"></i> Question Paper
                                </a>
                                <a href="MinorTest1/SetE/Solution.html" class="capsule-btn solution">
                                    <i class="fas fa-lightbulb"></i> Solution
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            VARDAAN LEARNING INSTITUTE &copy; 2025
        </footer>

    </div>

    <script type="module">
        // Init Lucide
        if (window.lucide) lucide.createIcons();

        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- TOGGLE LOGIC ---
        window.toggleTest = function(header) {
            const item = header.parentElement;
            const content = item.querySelector('.test-content');
            item.classList.toggle('active');
            if (item.classList.contains('active')) {
                content.style.maxHeight = content.scrollHeight + "px";
            } else {
                content.style.maxHeight = null;
            }
        };

        // --- BACKGROUND ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 25, 90); camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1; bloomPass.strength = 1.5; bloomPass.radius = 0.8;
        composer.addPass(bloomPass);
        const planetGeo = new THREE.SphereGeometry(12, 64, 64);
        const planetMat = new THREE.MeshBasicMaterial({ color: 0x220044 });
        const planetMesh = new THREE.Mesh(planetGeo, planetMat);
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i+=3) {
            const r = 1000 + Math.random() * 1000;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i+2] = r * Math.cos(phi);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ size: 1.5, color: 0xffffff, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            stars.rotation.y = time * 0.02;
            composer.render();
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
