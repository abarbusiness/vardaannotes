<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Course Mathematics - Select Module</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }

        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-thumb {
            background-color: #aa33ff;
            border-radius: 10px;
            border: 2px solid #0a0514;
        }
        body::-webkit-scrollbar-track { background-color: #0a0514; }

        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .back-btn {
            text-decoration: none;
            color: #00ffff;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            overflow: visible;
            cursor: pointer;
        }

        .logo-img {
            height: 120px;
            width: auto;
            object-fit: contain;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 20px rgba(170, 51, 255, 0.8);
        }

        .subtitle {
            color: #dcbfff;
            margin-top: 8px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            animation: slideUp 1s ease-out 0.5s forwards;
            opacity: 0;
        }

        .subject-card {
            background: rgba(20, 10, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 51, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            height: 140px;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(170, 51, 255, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #00ffff;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(170, 51, 255, 0.1);
            background: rgba(30, 20, 50, 0.8);
        }

        .subject-card:hover::before { opacity: 1; }

        .subject-icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #00ffff, #aa33ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        .subject-card:hover .subject-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .subject-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: #fff;
            font-weight: 600;
            margin: 0;
            z-index: 1;
            line-height: 1.3;
        }

        .card-science { border-bottom: 2px solid #00ffff; }

        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, #000000 100%);
            z-index: 5;
            pointer-events: none;
        }

        .math-glow {
            position: fixed;
            left: 50%;
            top: 42%;
            width: 260px;
            height: 260px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.96), rgba(0,255,255,0.72) 18%, rgba(0,255,255,0.18) 38%, rgba(170,51,255,0.18) 60%, transparent 74%);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.22), 0 0 90px rgba(170, 51, 255, 0.16);
            filter: blur(0.2px);
            z-index: 1;
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .subject-card { height: 120px; padding: 15px; }
            .subject-icon { font-size: 1.8rem; }
            .subject-name { font-size: 0.85rem; }
            .nav-bar {
                flex-direction: row;
                gap: 10px;
                padding: 0 5px;
                justify-content: space-between;
            }
            .back-btn { font-size: 0.8rem; padding: 6px 12px; }
            .logo-img { height: 60px; }
            .brand-container { gap: 8px; }
        }

        @media (max-width: 520px) {
            .subject-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="math-glow"></div>

    <div id="main-content">
        <div class="nav-bar">
            <a href="../../../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            <a href="../../../../index.html" class="brand-container">
                <img src="../../../../Vardaan%20comet%20logo%20animation%20video%20loop.gif" alt="Vardaan Comet Logo" class="logo-img">
            </a>
        </div>

        <div class="header-section">
            <h1>BRIDGE COURSE MATHEMATICS</h1>
            <div class="subtitle" style="color: #00ffff; font-weight: bold; letter-spacing: 2px;">MODULE SELECTOR</div>
            <div class="subtitle">Core Mathematics Chapters for Bridge Course</div>
        </div>

        <div class="subject-grid">
            <a href="module1.html" class="subject-card card-science">
                <i class="fas fa-cubes subject-icon"></i>
                <h3 class="subject-name">Sets</h3>
            </a>

            <a href="module2.html" class="subject-card card-science">
                <i class="fas fa-project-diagram subject-icon"></i>
                <h3 class="subject-name">Relations and Functions</h3>
            </a>

            <a href="module3.html" class="subject-card card-science">
                <i class="fas fa-compass subject-icon"></i>
                <h3 class="subject-name">Trigonometric Functions</h3>
            </a>

            <a href="module4.html" class="subject-card card-science">
                <i class="fas fa-square-root-variable subject-icon"></i>
                <h3 class="subject-name">Complex Numbers and Quadratic Equations</h3>
            </a>

            <a href="module5.html" class="subject-card card-science">
                <i class="fas fa-scale-balanced subject-icon"></i>
                <h3 class="subject-name">Linear Inequalities</h3>
            </a>

            <a href="module6.html" class="subject-card card-science">
                <i class="fas fa-shuffle subject-icon"></i>
                <h3 class="subject-name">Permutations and Combinations</h3>
            </a>
        </div>

        <footer>
            VARDAAN LEARNING INSTITUTE &copy; 2025
        </footer>
    </div>
</body>
</html>
