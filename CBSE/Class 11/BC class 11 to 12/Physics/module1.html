<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Mathematics - Select Part | Vardaan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- SCROLLBAR --- */
        body::-webkit-scrollbar {
            width: 8px;
        }

        body::-webkit-scrollbar-thumb {
            background-color: #aa33ff;
            border-radius: 10px;
            border: 2px solid #0a0514;
        }

        body::-webkit-scrollbar-track {
            background-color: #0a0514;
        }

        /* --- 3D BACKGROUND CONTAINER --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- CONTENT WRAPPER --- */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .back-btn {
            text-decoration: none;
            color: #00ffff;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        /* --- LOGO CONTAINER --- */
        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            overflow: visible;
            cursor: pointer;
        }

        .logo-img {
            height: 100px;
            width: auto;
            object-fit: contain;
            border: none;
            box-shadow: none;
            transition: filter 0.3s ease;
        }

        /* Standardized image rules for content (if added) */
        .content-image {
            max-width: 85%;
            height: auto;
            display: block;
            margin: 20px auto;
            border: none;
            box-shadow: none;
            transition: filter 0.3s ease;
        }

        /* Dark mode inversion (portal is dark but handles class for consistency) */
        html.dark-mode img, 
        html.dark-mode .content-image {
            filter: invert(1);
        }

        /* --- PAGE HEADER --- */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 20px rgba(170, 51, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.3);
            letter-spacing: 4px;
        }

        .select-part {
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #dcbfff;
            margin-top: 5px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* --- SUBJECT GRID --- */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            animation: slideUp 1s ease-out 0.5s forwards;
            opacity: 0;
            margin-top: 10px;
        }

        .subject-card {
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 51, 255, 0.4);
            border-radius: 12px;
            padding: 20px 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            height: 150px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .subject-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            opacity: 0.5;
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #00ffff;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.25), inset 0 0 20px rgba(170, 51, 255, 0.2);
            background: rgba(20, 10, 40, 0.8);
        }

        .subject-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ffff, #aa33ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        .subject-card:hover .subject-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .card-number {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1;
        }

        .subject-card:hover .card-number {
            color: #00ffff;
        }

        .subject-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #fff;
            font-weight: 600;
            margin: 0;
            z-index: 1;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        /* Highlight card 3 as shown in image */
        .card-center {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        }

        /* Layout adjustment for 7 cards: 5 on first row, 2 centered on second */
        .row-2 {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            margin-top: 15px;
            animation: slideUp 1s ease-out 0.7s forwards;
            opacity: 0;
        }

        .row-2 .subject-card {
            width: calc(20% - 12px);
        }

        /* --- FOOTER --- */
        footer {
            margin-top: auto;
            padding: 50px 0 20px;
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            width: 100%;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, #000000 100%);
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 1024px) {
            .subject-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .row-2 {
                flex-wrap: wrap;
                margin-top: 20px;
            }
            .row-2 .subject-card {
                width: calc(33.33% - 14px);
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .subject-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .row-2 .subject-card {
                width: calc(50% - 8px);
            }
            .subject-card { padding: 20px 10px; }
            .card-number { font-size: 2.5rem; }
            .subject-name { font-size: 0.9rem; }
            .logo-img { height: 60px; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>

    <div class="vignette"></div>
    <div id="canvas-container"></div>

    <div id="main-content">

        <div class="nav-bar">
            <a href="Physics.html" class="back-btn">

            <a href="../../../../index.html" class="brand-container">

        <div class="header-section">
            <h1>BASIC MATHEMATICS</h1>
            <div class="select-part">SELECT PART</div>
            <div class="subtitle">Foundation Mathematical Concepts for Physics</div>
        </div>

        <!-- First Row: 5 Cards -->
        <div class="subject-grid">
            <a href="Basic Mathematics/basicMathematics1.html" class="subject-card">
                <i class="fas fa-calculator subject-icon"></i>

            <a href="Basic Mathematics/basicMathematics2.html" class="subject-card">
                <i class="fas fa-superscript subject-icon"></i>
                <div class="card-number">2</div>
                <h3 class="subject-name">Logarithms</h3>
            </a>

            <a href="Basic Mathematics/basicMathematics3.html" class="subject-card card-center">

            <a href="Basic Mathematics/basicMathematics4.html" class="subject-card">

            <a href="Basic Mathematics/basicMathematics5.html" class="subject-card">

        <!-- Second Row: 2 Cards -->
        <div class="row-2">
            <a href="Basic Mathematics/basicMathematics6.html" class="subject-card">
                <i class="fas fa-infinity subject-icon"></i>
                <div class="card-number">6</div>

            </a>

            <a href="Basic Mathematics/basicMathematics7.html" class="subject-card">
                <i class="fas fa-location-arrow subject-icon"></i>
                <div class="card-number">7</div>
                <h3 class="subject-name">Vectors</h3>

        </div>

        <footer>
            VARDAAN LEARNING INSTITUTE &copy; 2025
        </footer>

    <!-- 3D Background Engine (Preserved from Physics.html) -->
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 25, 110); // Slightly zoomed out for grid
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1; bloomPass.strength = 1.8; bloomPass.radius = 0.6;
        composer.addPass(bloomPass);

        // Planet Shaders
        const planetVertexShader = `
            varying vec2 vUv; varying vec3 vNormal; varying vec3 vViewPosition;
            void main() {
                vUv = uv; vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const planetFragmentShader = `
            uniform float uTime; varying vec2 vUv; varying vec3 vNormal; varying vec3 vViewPosition;
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i = floor(v + dot(v, C.yy) ); vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1; i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1; i = mod289(i);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m ; m = m*m ;
                vec3 x = 2.0 * fract(p * C.www) - 1.0; vec3 h = abs(x) - 0.5; vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox; m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g; g.x = a0.x * x0.x + h.x * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }
            float fbm(vec2 p) {
                float value = 0.0; float amplitude = 0.5;
                for (int i = 0; i < 5; i++) { value += amplitude * snoise(p); p *= 2.0; amplitude *= 0.5; }
                return value;
            }
            void main() {
                vec3 viewDir = normalize(vViewPosition); vec3 normal = normalize(vNormal); float ndotv = dot(normal, viewDir);
                vec2 uv = vUv; uv.x -= uTime * 0.01;
                float terrain = fbm(uv * 3.0);
                vec2 cloudUV = vUv; cloudUV.x -= uTime * 0.03; cloudUV.y += snoise(cloudUV * 4.0 + uTime * 0.05) * 0.1;
                float clouds = fbm(cloudUV * 4.0);
                vec3 deepOcean = vec3(0.0, 0.05, 0.15); vec3 shallowOcean = vec3(0.0, 0.3, 0.6);
                vec3 land = vec3(0.1, 0.5, 0.3); vec3 mountain = vec3(0.6, 0.6, 0.8);
                vec3 surfaceCol = mix(deepOcean, shallowOcean, smoothstep(-0.4, -0.1, terrain));
                surfaceCol = mix(surfaceCol, land, smoothstep(-0.1, 0.1, terrain));
                surfaceCol = mix(surfaceCol, mountain, smoothstep(0.4, 0.6, terrain));
                float cloudCover = smoothstep(0.3, 0.7, clouds);
                surfaceCol = mix(surfaceCol, vec3(1.0), cloudCover * 0.7);
                float fresnel = pow(1.0 - ndotv, 3.0);
                vec3 atmosphere = vec3(0.0, 0.8, 1.0) * fresnel * 1.5;
                float light = dot(normal, normalize(vec3(1.0, 0.5, 1.0))) * 0.5 + 0.5;
                surfaceCol *= (0.3 + 0.7 * light);
                gl_FragColor = vec4(surfaceCol + atmosphere, 1.0);
            }
        `;

        const planetGeo = new THREE.SphereGeometry(15, 64, 64);
        const planetMat = new THREE.ShaderMaterial({ uniforms: { uTime: { value: 0 } }, vertexShader: planetVertexShader, fragmentShader: planetFragmentShader });
        const planetMesh = new THREE.Mesh(planetGeo, planetMat);
        scene.add(planetMesh);

        // Subtler glow shell
        const glowGeo = new THREE.SphereGeometry(15.5, 64, 64);
        const glowMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1, side: THREE.BackSide });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glowMesh);

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPos = new Float32Array(starCount * 3);
        const starCol = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 3) {
            const r = 1000 + Math.random() * 1500;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i + 2] = r * Math.cos(phi);
            const c = new THREE.Color().setHSL(0.5 + Math.random() * 0.2, 0.7, 0.8);
            starCol[i] = c.r; starCol[i + 1] = c.g; starCol[i + 2] = c.b;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
        const starMat = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        const clock = new THREE.Clock();
        const mouse = new THREE.Vector2();

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Dynamic camera movement
            camera.position.x = Math.sin(time * 0.03) * 15 + (mouse.x * 5);
            camera.position.y = 15 + Math.cos(time * 0.03) * 8 + (mouse.y * 5);
            camera.lookAt(0, 0, 0);

            planetMat.uniforms.uTime.value = time;
            planetMesh.rotation.y = time * 0.05;
            stars.rotation.y = time * 0.01;

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
